<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김둔둔 일일 기록</title>
<style>
    :root {
    --color-bg: #fffdf9;
    --color-bg-secondary: #fdf6ee;
    --color-bg-tertiary: #faeedd;
    --color-text: #2e2416;
    --color-text-secondary: #7a6a55;
    --color-text-tertiary: #b0a090;
    --color-border: rgba(180,140,90,0.18);
    --color-border-md: rgba(180,140,90,0.32);
    --radius-md: 12px;
    --radius-lg: 18px;
    --font: 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #221e18;
      --color-bg-secondary: #2c2720;
      --color-bg-tertiary: #1a1710;
      --color-text: #f5ede0;
      --color-text-secondary: #a89880;
      --color-text-tertiary: #6b5e4e;
      --color-border: rgba(255,200,120,0.12);
      --color-border-md: rgba(255,200,120,0.22);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-tertiary); font-family: var(--font); color: var(--color-text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 1rem; }
  .header { text-align: center; padding: 1.5rem 0 1rem; }
  .dog-avatar { width: 82px; height: 82px; border-radius: 50%; overflow: hidden; margin: 0 auto .75rem; border: 3px solid #FAC775; box-shadow: 0 4px 16px rgba(240,149,149,0.35); }
  .dog-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .dog-name { font-size: 22px; font-weight: 700; color: var(--color-text); letter-spacing: -0.3px; }
  .dog-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .date-nav { display: flex; align-items: center; justify-content: space-between; padding: .5rem 0 1rem; }
  .date-nav button { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); font-family: var(--font); }
  .date-nav button:hover { background: var(--color-bg-secondary); }
  .date-label { font-size: 15px; font-weight: 600; color: var(--color-text); }
  .section { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: .75rem; box-shadow: 0 2px 8px rgba(180,140,90,0.07); }
  .section-title { font-size: 13px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: .85rem; display: flex; align-items: center; gap: 6px; letter-spacing: 0.2px; }
  .snack-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .snack-name { flex: 1; }
  .snack-name input { font-size: 14px; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg-secondary); color: var(--color-text); font-family: var(--font); outline: none; width: 100%; }
  .snack-delete { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 18px; padding: 4px; line-height: 1; }
  .add-btn { background: none; border: 1.5px dashed var(--color-border-md); border-radius: var(--radius-md); padding: 8px 12px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; width: 100%; margin-top: 4px; font-family: var(--font); }
  .add-btn:hover { background: var(--color-bg-secondary); }
  .poop-count { font-size: 20px; font-weight: 700; color: var(--color-text); text-align: center; margin-bottom: 12px; }
  .poop-detail-text { font-size: 12px; color: var(--color-text-secondary); display: block; font-weight: 400; margin-top: 2px; }
  .poop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .poop-btn { border: 1px solid var(--color-border); border-radius: 18px; padding: 10px 4px 8px; text-align: center; cursor: pointer; background: var(--color-bg-secondary); transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .poop-emoji { font-size: 26px; line-height: 1; display: block; }
  .poop-label { font-size: 10px; color: var(--color-text-tertiary); font-weight: 600; }
  .poop-btn.poop-type.active { background: #FFF5E6; border-color: #E08A00; transform: scale(1.04); }
  .poop-btn.pee-type.active { background: #EBF4FF; border-color: #378ADD; transform: scale(1.04); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .toggle-label { font-size: 14px; color: var(--color-text); font-weight: 500; }
  .toggle { position: relative; width: 42px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--color-border-md); border-radius: 24px; cursor: pointer; transition: .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle input:checked + .toggle-slider { background: #F5A623; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
  .walk-input { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .walk-input input[type=number] { width: 72px; font-size: 14px; padding: 7px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg-secondary); color: var(--color-text); text-align: center; font-family: var(--font); outline: none; }
  .walk-input span { font-size: 13px; color: var(--color-text-secondary); }
  .walk-times { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .walk-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--color-border); font-size: 12px; cursor: pointer; color: var(--color-text-secondary); background: var(--color-bg-secondary); font-family: var(--font); transition: all .15s; }
  .walk-chip.active { background: #FFF3D6; border-color: #F5A623; color: #7A4F00; font-weight: 600; }
  .meal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meal-btn { border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 14px 10px 12px; text-align: center; cursor: pointer; background: var(--color-bg-secondary); transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .meal-btn:hover { border-color: var(--color-border-md); transform: translateY(-1px); }
  .meal-icon-wrap { font-size: 30px; line-height: 1; position: relative; display: flex; align-items: center; justify-content: center; }
  .meal-badge { position: absolute; top: -4px; right: -10px; font-size: 14px; line-height: 1; }
  .meal-name { font-size: 12px; color: var(--color-text-secondary); font-weight: 600; }
  .meal-sub { font-size: 10px; color: var(--color-text-tertiary); }
  .meal-btn.active { transform: scale(1.03); }
  .meal-btn.active.morning { background: #FFF8EE; border-color: #E08A00; }
  .meal-btn.active.morning .meal-name { color: #854F0B; }
  .meal-btn.active.morning .meal-sub { color: #E08A00; }
  .meal-btn.active.evening { background: #F0EEFF; border-color: #7F77DD; }
  .meal-btn.active.evening .meal-name { color: #3C3489; }
  .meal-btn.active.evening .meal-sub { color: #7F77DD; }
  .meal-btn.active.water { background: #EEF6FF; border-color: #378ADD; }
  .meal-btn.active.water .meal-name { color: #0C447C; }
  .meal-btn.active.water .meal-sub { color: #378ADD; }
  .meal-btn.active.no-appetite { background: #FFF0F0; border-color: #E24B4A; }
  .meal-btn.active.no-appetite .meal-name { color: #A32D2D; }
  .meal-btn.active.no-appetite .meal-sub { color: #E24B4A; }
  .memo-textarea { width: 100%; min-height: 80px; font-size: 14px; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg-secondary); color: var(--color-text); resize: vertical; font-family: var(--font); line-height: 1.6; outline: none; }
  .save-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #FAC775, #F09595); color: #fff; border: none; border-radius: var(--radius-lg); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: .5rem; transition: opacity .15s; font-family: var(--font); letter-spacing: 0.3px; box-shadow: 0 4px 14px rgba(240,149,149,0.35); }
  .save-btn:hover { opacity: .9; }
  .summary-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: .75rem; }
  .stat-card { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: .85rem; text-align: center; box-shadow: 0 2px 6px rgba(180,140,90,0.07); }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--color-text); }
  .stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; font-weight: 500; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #FAC775, #F09595); color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 100; box-shadow: 0 4px 14px rgba(240,149,149,0.4); }
  .toast.show { opacity: 1; }
  .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .photo-slot { position: relative; aspect-ratio: 1; border-radius: var(--radius-lg); border: 1.5px dashed var(--color-border-md); background: var(--color-bg-secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; transition: border-color .15s; }
  .photo-slot:hover { border-color: #FAC775; }
  .photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
  .photo-placeholder-icon { font-size: 28px; line-height: 1; }
  .photo-placeholder-text { font-size: 12px; color: var(--color-text-tertiary); }
  .photo-preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-lg); }
  .photo-remove { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.45); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 2; }
  .photo-slot-label { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.35); color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; pointer-events: none; z-index: 2; }

  .tab-bar { display: flex; gap: 0; margin-bottom: 1rem; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 4px; }
  .tab-btn { flex: 1; padding: 9px 0; font-size: 13px; font-weight: 600; border: none; background: none; cursor: pointer; border-radius: 14px; color: var(--color-text-secondary); font-family: var(--font); transition: all .2s; }
  .tab-btn.active { background: linear-gradient(135deg, #FAC775, #F09595); color: #fff; box-shadow: 0 2px 8px rgba(240,149,149,0.3); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .history-empty { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 14px; }
  .history-empty-icon { font-size: 48px; display: block; margin-bottom: .75rem; }
  .history-loading { display: flex; flex-direction: column; gap: 10px; }
  .skeleton { background: linear-gradient(90deg, var(--color-bg-secondary) 25%, var(--color-bg-tertiary) 50%, var(--color-bg-secondary) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: var(--radius-lg); }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skeleton-card { height: 90px; width: 100%; }
  .skeleton-card-sm { height: 70px; width: 100%; opacity: 0.6; }
  .history-card { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: .75rem; box-shadow: 0 2px 8px rgba(180,140,90,0.07); cursor: pointer; transition: all .15s; }
  .history-card:hover { border-color: #FAC775; transform: translateY(-1px); }
  .history-date { font-size: 14px; font-weight: 700; color: var(--color-text); margin-bottom: .6rem; display: flex; align-items: center; justify-content: space-between; }
  .history-date-go { font-size: 11px; color: var(--color-text-tertiary); }
  .history-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: .6rem; }
  .history-chip { font-size: 11px; padding: 3px 9px; border-radius: 12px; font-weight: 500; }
  .chip-poop { background: #FFF5E6; color: #854F0B; border: 1px solid #E08A00; }
  .chip-walk { background: #FFF3D6; color: #7A4F00; border: 1px solid #F5A623; }
  .chip-meal { background: #F0EEFF; color: #3C3489; border: 1px solid #7F77DD; }
  .chip-snack { background: #EAF3DE; color: #3B6D11; border: 1px solid #639922; }
  .history-memo { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin-top: .4rem; padding-top: .5rem; border-top: 1px solid var(--color-border); }
  .history-photos { display: flex; gap: 6px; margin-bottom: .5rem; }
  .history-photo { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; border: 1px solid var(--color-border); }
</style>
</head>

<script>
// Firebase 초기화
const firebaseConfig = {
  apiKey: "AIzaSyC2Gy-vaAFOi4QLHEkj1WogCtqBl2S35rI",
  authDomain: "kimdundun-65411.firebaseapp.com",
  databaseURL: "https://kimdundun-65411-default-rtdb.firebaseio.com",
  projectId: "kimdundun-65411",
  storageBucket: "kimdundun-65411.firebasestorage.app",
  messagingSenderId: "1094343336775",
  appId: "1:1094343336775:web:1c88192d6ec5e00d346262"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const CLOUD_NAME = "dcpbncvr5";

let currentDate = new Date(), data = {}, photos = [null, null];

function dateKey(d){ return d.toISOString().slice(0,10); }
function formatDate(d){ const days=['일','월','화','수','목','금','토']; return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')'; }
function changeDate(dir){ const d=new Date(currentDate); d.setDate(d.getDate()+dir); if(d>new Date())return; currentDate=d; loadDay(); }
function getDay(k){ return data[k]||{snacks:[],poops:[],walkDone:false,walkMinutes:30,walkTimes:[],meals:[],memo:'',photos:[null,null]}; }

// Cloudinary 업로드
async function uploadToCloudinary(base64) {
  const blob = await fetch(base64).then(r=>r.blob());
  const fd = new FormData();
  fd.append('file', blob);
  fd.append('upload_preset', 'dundun_preset');
  try {
    const res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/image/upload', {method:'POST',body:fd});
    const json = await res.json();
    return json.secure_url || null;
  } catch(e) { console.error('Cloudinary 실패', e); return null; }
}

function handlePhoto(idx, input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result;
    photos[idx] = base64;
    renderPhotoSlot(idx, base64);
    showToast('사진 업로드 중... ☁️');
    const url = await uploadToCloudinary(base64);
    if(url) {
      photos[idx] = url;
      const k=dateKey(currentDate), d=getDay(k);
      d.photos = d.photos||[null,null];
      d.photos[idx] = url;
      data[k] = d;
      showToast('사진 업로드 완료! 🐾');
    }
  };
  reader.readAsDataURL(file);
}

function renderPhotoSlot(idx, src) {
  const slot=document.getElementById('slot-'+idx), ph=document.getElementById('placeholder-'+idx), lbl=document.getElementById('label-'+idx);
  let img=slot.querySelector('.photo-preview'), rmBtn=slot.querySelector('.photo-remove');
  if(src){
    ph.style.display='none'; lbl.style.display='';
    if(!img){img=document.createElement('img');img.className='photo-preview';slot.appendChild(img);}
    img.src=src;
    if(!rmBtn){rmBtn=document.createElement('button');rmBtn.className='photo-remove';rmBtn.textContent='×';rmBtn.onclick=function(e){e.stopPropagation();removePhoto(idx);};slot.appendChild(rmBtn);}
  } else {
    ph.style.display=''; lbl.style.display='none';
    if(img)img.remove(); if(rmBtn)rmBtn.remove();
  }
}

function removePhoto(idx){
  photos[idx]=null; renderPhotoSlot(idx,null);
  const k=dateKey(currentDate),d=getDay(k);
  d.photos=d.photos||[null,null]; d.photos[idx]=null; data[k]=d;
}

function loadDay() {
  const k=dateKey(currentDate), d=getDay(k);
  document.getElementById('date-label').textContent=formatDate(currentDate);
  renderSnacks(d.snacks);
  for(let i=0;i<5;i++){const el=document.getElementById('poop-'+i);if(el)el.classList.toggle('active',(d.poops||[]).includes(i));}
  updatePoopCount();
  document.getElementById('walk-toggle').checked=d.walkDone;
  document.getElementById('walk-detail').style.display=d.walkDone?'':'none';
  document.getElementById('walk-minutes').value=d.walkMinutes||30;
  document.querySelectorAll('.walk-chip').forEach(function(c){c.classList.toggle('active',(d.walkTimes||[]).includes(c.dataset.val));});
  document.querySelectorAll('.meal-btn').forEach(function(b){b.classList.toggle('active',(d.meals||[]).includes(b.dataset.val));});
  document.getElementById('memo-input').value=d.memo||'';
  photos=d.photos||[null,null];
  renderPhotoSlot(0,photos[0]); renderPhotoSlot(1,photos[1]);
  updateSummary();
}

function renderSnacks(snacks) {
  const c=document.getElementById('snack-list'); c.innerHTML='';
  (snacks||[]).forEach(function(s,i){
    const row=document.createElement('div'); row.className='snack-row';
    row.innerHTML='<div class="snack-name"><input type="text" placeholder="🍖 간식 이름을 입력하세요" value="'+s.name+'" oninput="updateSnack('+i+',this.value)"></div><button class="snack-delete" onclick="removeSnack('+i+')">×</button>';
    c.appendChild(row);
  });
}

function addSnack(){ const k=dateKey(currentDate),d=getDay(k); if(!d.snacks)d.snacks=[]; d.snacks.push({name:''}); data[k]=d; renderSnacks(d.snacks); }
function removeSnack(i){ const k=dateKey(currentDate),d=getDay(k); d.snacks.splice(i,1); data[k]=d; renderSnacks(d.snacks); }
function updateSnack(i,v){ const k=dateKey(currentDate),d=getDay(k); d.snacks[i].name=v; data[k]=d; }

function togglePoop(i){
  const k=dateKey(currentDate),d=getDay(k);
  if(!d.poops)d.poops=[];
  const idx=d.poops.indexOf(i);
  if(idx===-1)d.poops.push(i); else d.poops.splice(idx,1);
  data[k]=d;
  document.getElementById('poop-'+i).classList.toggle('active');
  updatePoopCount(); updateSummary();
}

function updatePoopCount(){
  const k=dateKey(currentDate),d=getDay(k);
  const poops=d.poops||[];
  const pc=poops.filter(function(i){return i<3;}).length;
  const pe=poops.filter(function(i){return i>=3;}).length;
  document.getElementById('poop-count').textContent=poops.length;
  const parts=[];
  if(pc>0)parts.push('응가 '+pc+'번');
  if(pe>0)parts.push('쉬야 '+pe+'번');
  document.getElementById('poop-detail-text').textContent=parts.join(' · ');
}

function toggleWalk(){
  const k=dateKey(currentDate),d=getDay(k);
  d.walkDone=document.getElementById('walk-toggle').checked;
  data[k]=d;
  document.getElementById('walk-detail').style.display=d.walkDone?'':'none';
  updateSummary();
}

function toggleWalkTime(el){
  const k=dateKey(currentDate),d=getDay(k),v=el.dataset.val;
  if(!d.walkTimes)d.walkTimes=[];
  el.classList.toggle('active');
  if(d.walkTimes.includes(v))d.walkTimes=d.walkTimes.filter(function(t){return t!==v;});
  else d.walkTimes.push(v);
  data[k]=d;
}

function toggleMeal(el){
  const k=dateKey(currentDate),d=getDay(k),v=el.dataset.val;
  if(!d.meals)d.meals=[];
  el.classList.toggle('active');
  if(d.meals.includes(v))d.meals=d.meals.filter(function(m){return m!==v;});
  else d.meals.push(v);
  data[k]=d;
}

function updateSummary(){
  const k=dateKey(currentDate),d=getDay(k);
  document.getElementById('summary-poop').textContent=(d.poops||[]).length+'회';
  const w=document.getElementById('walk-toggle').checked;
  const m=parseInt(document.getElementById('walk-minutes').value)||0;
  document.getElementById('summary-walk').textContent=w?m+'분':'-';
}

function saveDay(){
  const k=dateKey(currentDate),d=getDay(k);
  d.memo=document.getElementById('memo-input').value;
  d.walkDone=document.getElementById('walk-toggle').checked;
  d.walkMinutes=parseInt(document.getElementById('walk-minutes').value)||0;
  d.photos=photos;
  data[k]=d;
  db.ref('dundun').set(data)
    .then(function(){ showToast('둔둔이 기록 저장 완료! 🐾'); })
    .catch(function(){ showToast('저장 실패 😢 다시 시도해주세요'); });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',(tab==='record'&&i===0)||(tab==='history'&&i===1));
  });
  document.getElementById('tab-record').classList.toggle('active',tab==='record');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  if(tab==='history'){
    const el=document.getElementById('history-list');
    if(Object.keys(data).length>0) renderHistory();
    else el.innerHTML='<div class="history-loading"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card-sm"></div></div>';
  }
}

function renderHistory(){
  const el=document.getElementById('history-list');
  const keys=Object.keys(data).sort().reverse();
  if(keys.length===0){
    el.innerHTML='<div class="history-empty"><span class="history-empty-icon">🐾</span>아직 저장된 기록이 없어요!<br>오늘 기록을 먼저 저장해보세요.</div>';
    return;
  }
  const days=['일','월','화','수','목','금','토'];
  el.innerHTML=keys.map(function(k){
    const d=data[k];
    const date=new Date(k);
    const label=date.getFullYear()+'년 '+(date.getMonth()+1)+'월 '+date.getDate()+'일 ('+days[date.getDay()]+')';
    const poops=d.poops||[];
    const pc=poops.filter(function(i){return i<3;}).length;
    const pe=poops.filter(function(i){return i>=3;}).length;
    const chips=[];
    if(pc>0)chips.push('<span class="history-chip chip-poop">💩 응가 '+pc+'번</span>');
    if(pe>0)chips.push('<span class="history-chip chip-poop">🫧 쉬야 '+pe+'번</span>');
    if(d.walkDone)chips.push('<span class="history-chip chip-walk">🐾 산책 '+(d.walkMinutes||0)+'분</span>');
    (d.meals||[]).forEach(function(m){chips.push('<span class="history-chip chip-meal">🥣 '+m+'</span>');});
    (d.snacks||[]).filter(function(s){return s.name;}).forEach(function(s){chips.push('<span class="history-chip chip-snack">🦴 '+s.name+'</span>');});
    const ph=(d.photos||[]).filter(Boolean);
    const photoHtml=ph.length?'<div class="history-photos">'+ph.map(function(p){return '<img class="history-photo" src="'+p+'">';}).join('')+'</div>':'';
    const memoHtml=d.memo?'<div class="history-memo">'+d.memo+'</div>':'';
    return '<div class="history-card" onclick="goToDate(''+k+'')"><div class="history-date">'+label+'<span class="history-date-go">기록 보기 →</span></div>'+photoHtml+'<div class="history-chips">'+chips.join('')+'</div>'+memoHtml+'</div>';
  }).join('');
}

function goToDate(k){ currentDate=new Date(k); switchTab('record'); loadDay(); }

// 앱 시작
loadDay();

// Firebase 실시간 수신
db.ref('dundun').on('value', function(snapshot){
  const val=snapshot.val();
  if(val){
    Object.keys(val).forEach(function(k){
      if(data[k]&&data[k].photos) val[k].photos=val[k].photos||data[k].photos;
    });
    data=val;
    loadDay();
    if(document.getElementById('tab-history').classList.contains('active')) renderHistory();
  }
});
</script>

</body>
</html>
